# Haftada 3 gün (Pzt/Çar/Cum) TR ~05:00 — UTC 02:00
name: Auto Article Generation

on:
  schedule:
    - cron: "0 2 * * 1,3,5"
  workflow_dispatch:
    inputs:
      publish:
        description: "WordPress'te yayınla (draft yerine publish)"
        type: boolean
        default: true
      featured_image:
        description: "Stock featured image ata (Pexels/Pixabay)"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: auto-article
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate and publish article
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          ADANAAVUKAT_WP_BASE_URL: ${{ secrets.ADANAAVUKAT_WP_BASE_URL || 'https://adanaavukat.org' }}
          ADANAAVUKAT_WP_USERNAME: ${{ secrets.ADANAAVUKAT_WP_USERNAME }}
          ADANAAVUKAT_WP_APP_PASSWORD: ${{ secrets.ADANAAVUKAT_WP_APP_PASSWORD }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          AUTO_ARTICLE_PUBLISH: ${{ github.event_name == 'schedule' || inputs.publish }}
          AUTO_ARTICLE_FEATURED_IMAGE: ${{ github.event_name == 'schedule' || inputs.featured_image }}
        run: node scripts/generate-auto-article.mjs

      - name: Commit report artifacts
        if: success()
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config advice.addIgnoredFile false

          SLUG="${{ steps.generate.outputs.slug }}"
          if [ -z "$SLUG" ] && [ -f .auto-article-last-run.json ]; then
            SLUG="$(node -e "console.log(JSON.parse(require('fs').readFileSync('.auto-article-last-run.json','utf8')).slug || '')")"
          fi

          mkdir -p reports generated/auto-articles

          git add -f .auto-article-last-run.json || true
          git add reports/auto-article-*.json || true
          git add "generated/auto-articles/${SLUG}.json" 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "Commit edilecek değişiklik yok."
            exit 0
          fi

          git commit -m "auto-article: ${SLUG:-update}"
          git push
